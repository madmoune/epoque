@if (!dismissed()) {
<section
  class="success-popup"
  [class.partial]="tone === 'partial'"
  role="alert"
  aria-live="assertive"
  (click)="dismissFromBackground($event)"
>
  <span class="success-icon" aria-hidden="true">{{ tone === 'partial' ? '!' : '✓' }}</span>
  <span class="success-copy">
    <strong>{{ title }}</strong>
    @if (message) {
      <span>{{ message }}</span>
    }
    @if (answer) {
      <span class="success-answer">{{ answer }}</span>
    }
  </span>
  @if (showAction) {
    <span class="popup-actions">
      <button type="button" (click)="action.emit()">{{ actionLabel }}</button>
      <a routerLink="/" [fragment]="menuFragment">Retour au menu</a>
    </span>
  }
</section>
}
